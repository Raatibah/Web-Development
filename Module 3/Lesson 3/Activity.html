<!DOCTYPE html>
<html>

<head>
    <title>Interactive Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-container">
        <h2>Sign up</h2>
        <form>
            <label for="name">Full name</label>
            <input type="text" placeholder="Enter your name" id="name" required>
            <label for="email">Email</label>
            <input type="email" placeholder="email@email.com" id="email" required>
            <label for="password">Password</label>
            <input type="password" placeholder="Minimum 6 characters" id="password" pattern=".{6,}" required>
            <label for="message">Message</label>
            <textarea placeholder="Write something...." id="message" rows="4" required></textarea>
            <button type="submit">Submit</button>
        </form>
        <p class="note">
            Fields turn green when valid and red when invalid
        </p>
    </div>
</body>

</html>
