<!DOCTYPE html>
<html>
    <head>
        <title>Product Card Gallery</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="gallery">
            <!--Card 1-->
            <div class="card">
                <img src="Headphones.jpg" alt="">
                <h2>Wireless Headphones</h2>
                <p>High quality sound with noise cancellation</p>
                <span class="price">$59.5</span>
                <button>Buy Now</button>
            </div>
            <!--Card 2-->
            <div class="card">
                <img src="Smartwatch.jpeg" alt="">
                <h2>Smartwatch</h2>
                <p>Track your fitness and notifications easily.</p>
                <span class="price">$89.5</span>
                <button>Buy Now</button>
            </div>

        </div>
    </body>
</html>
